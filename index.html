<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .source-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            background: #111128;
            width: 900px;
            max-width: 100%;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f3460;
        }
        .source-bar .label {
            font-size: 0.8rem;
            color: #666;
            margin-right: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .src-btn {
            padding: 5px 14px;
            border: 1px solid #0f3460;
            border-radius: 5px;
            background: #1a1a2e;
            color: #aaa;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.15s;
        }
        .src-btn:hover { border-color: #97ce4c; color: #fff; }
        .src-btn.active { background: #97ce4c; color: #000; font-weight: 700; border-color: #97ce4c; }
        .src-btn.error { border-color: #e74c3c; color: #e74c3c; opacity: 0.5; }
        .video-wrapper {
            position: relative;
            width: 900px;
            max-width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .lang-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #0f0f24;
            width: 900px;
            max-width: 100%;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f346055;
        }
        .lang-bar .label {
            font-size: 0.8rem;
            color: #666;
            margin-right: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .lang-btn {
            padding: 4px 12px;
            border: 1px solid #0f3460;
            border-radius: 5px;
            background: #1a1a2e;
            color: #aaa;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.15s;
        }
        .lang-btn:hover { border-color: #3498db; color: #fff; }
        .lang-btn.active { background: #3498db; color: #fff; font-weight: 700; border-color: #3498db; }
        .lang-hint {
            padding: 8px 16px;
            width: 900px;
            max-width: 100%;
            background: #1a1a0e;
            border-bottom: 1px solid #97ce4c33;
            font-size: 0.78rem;
            color: #97ce4c;
        }
        .lang-hint b {
            color: #fff;
        }
        .status {
            padding: 8px 16px;
            width: 900px;
            max-width: 100%;
            background: #111128;
            font-size: 0.78rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="source-bar" id="sourceBar"></div>
    <div class="lang-bar" id="langBar">
        <span class="label">Idioma:</span>
        <button class="lang-btn active" onclick="setLang('pt')" id="lang-pt">🇧🇷 Português</button>
        <button class="lang-btn" onclick="setLang('en')" id="lang-en">🇺🇸 English</button>
    </div>
    <div class="lang-hint" id="langHint">
        ⚙️ Dentro do player: clique em <b>CC</b>, <b>Legendas</b> ou no ícone de <b>engrenagem ⚙️</b> e selecione <b>Portuguese</b>
    </div>
    <div class="video-wrapper">
        <iframe id="player" allowfullscreen allow="autoplay; encrypted-media; fullscreen; picture-in-picture" referrerpolicy="origin"></iframe>
    </div>
    <div class="status" id="status"></div>

    <script src="src/t.js"></script>

</body>
</html>
